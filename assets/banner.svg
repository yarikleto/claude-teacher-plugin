<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="16" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#ffffff">
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="100" cy="50" r="1.5"/>
    <circle cx="150" cy="50" r="1.5"/>
    <circle cx="200" cy="50" r="1.5"/>
    <circle cx="250" cy="50" r="1.5"/>
    <circle cx="50" cy="100" r="1.5"/>
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="150" cy="100" r="1.5"/>
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="250" cy="100" r="1.5"/>
    <circle cx="50" cy="150" r="1.5"/>
    <circle cx="100" cy="150" r="1.5"/>
    <circle cx="650" cy="50" r="1.5"/>
    <circle cx="700" cy="50" r="1.5"/>
    <circle cx="750" cy="50" r="1.5"/>
    <circle cx="800" cy="50" r="1.5"/>
    <circle cx="850" cy="50" r="1.5"/>
    <circle cx="650" cy="100" r="1.5"/>
    <circle cx="700" cy="100" r="1.5"/>
    <circle cx="750" cy="100" r="1.5"/>
    <circle cx="800" cy="100" r="1.5"/>
    <circle cx="850" cy="100" r="1.5"/>
    <circle cx="750" cy="150" r="1.5"/>
    <circle cx="800" cy="150" r="1.5"/>
    <circle cx="850" cy="150" r="1.5"/>
    <circle cx="50" cy="200" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/>
    <circle cx="50" cy="250" r="1.5"/>
    <circle cx="100" cy="250" r="1.5"/>
    <circle cx="800" cy="200" r="1.5"/>
    <circle cx="850" cy="200" r="1.5"/>
    <circle cx="800" cy="250" r="1.5"/>
    <circle cx="850" cy="250" r="1.5"/>
  </g>

  <!-- Graduation cap icon -->
  <g transform="translate(180, 75)">
    <!-- Cap top -->
    <polygon points="0,35 45,10 90,35 45,60" fill="url(#accent)" opacity="0.9"/>
    <!-- Cap brim shadow -->
    <polygon points="0,35 45,60 90,35 45,45" fill="#e94560" opacity="0.4"/>
    <!-- Tassel line -->
    <line x1="45" y1="10" x2="20" y2="10" stroke="#f5a623" stroke-width="2"/>
    <line x1="20" y1="10" x2="20" y2="35" stroke="#f5a623" stroke-width="2"/>
    <circle cx="20" cy="38" r="3" fill="#f5a623"/>
    <!-- Code brackets -->
    <text x="30" y="42" font-family="monospace" font-size="18" fill="#ffffff" font-weight="bold" opacity="0.9">&lt;/&gt;</text>
  </g>

  <!-- Main title -->
  <text x="300" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Claude Teacher</text>

  <!-- Accent line -->
  <rect x="300" y="130" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="300" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a0aec0">The AI tutor plugin for Claude Code</text>

  <!-- Feature pills -->
  <g transform="translate(300, 185)">
    <rect x="0" y="0" width="140" height="28" rx="14" fill="#533483" opacity="0.5"/>
    <text x="70" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">Socratic Method</text>

    <rect x="150" y="0" width="155" height="28" rx="14" fill="#533483" opacity="0.5"/>
    <text x="227" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">Spaced Repetition</text>

    <rect x="315" y="0" width="165" height="28" rx="14" fill="#533483" opacity="0.5"/>
    <text x="397" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">Misconception Tracking</text>

    <rect x="0" y="36" width="125" height="28" rx="14" fill="#533483" opacity="0.5"/>
    <text x="62" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">Adaptive Quizzes</text>

    <rect x="135" y="36" width="130" height="28" rx="14" fill="#533483" opacity="0.5"/>
    <text x="200" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">ASCII Diagrams</text>

    <rect x="275" y="36" width="145" height="28" rx="14" fill="#533483" opacity="0.5"/>
    <text x="347" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">Progress Tracking</text>
  </g>
</svg>
