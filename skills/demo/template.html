<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__TITLE__ — Claude Teacher</title>

  <!-- CDN: Bootstrap 5 (CSS + Icons) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    /* ═══════════════════════════════════════════════
       Theme: dark (default) + light mode.
       Toggle via data-bs-theme on <html>.
       ═══════════════════════════════════════════════ */

    /* ── Dark theme (default) ──────────────────── */
    [data-bs-theme="dark"] {
      --node-a: #4ea8de;
      --node-b: #4ecca3;
      --node-c: #f0c040;
      --data: #c084fc;
      --accent: #e94560;
      --accent-glow: rgba(233, 69, 96, 0.3);
      --success: #4ecca3;
      --warning: #f0c040;
      --error: #e94560;
      --info: #4ea8de;
      --surface: #1c1f2e;
      --primary: #0f3460;
      --text: #e8e8ed;
      --text-muted: #8b8fa3;
      --text-dim: #5a5e73;
      --canvas-bg: #141722;
      --panel-border: rgba(255, 255, 255, 0.06);
    }
    [data-bs-theme="dark"] body {
      background: #111318;
    }

    /* ── Light theme ───────────────────────────── */
    [data-bs-theme="light"] {
      --node-a: #2563eb;
      --node-b: #16a34a;
      --node-c: #d97706;
      --data: #9333ea;
      --accent: #dc2626;
      --accent-glow: rgba(220, 38, 38, 0.2);
      --success: #16a34a;
      --warning: #d97706;
      --error: #dc2626;
      --info: #2563eb;
      --surface: #ffffff;
      --primary: #1e40af;
      --text: #1e293b;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --canvas-bg: #f8fafc;
      --panel-border: rgba(0, 0, 0, 0.1);
    }
    [data-bs-theme="light"] body {
      background: #f1f5f9;
    }

    /* ── Shared styles ─────────────────────────── */
    body { min-height: 100vh; }

    .gradient-title {
      background: linear-gradient(135deg, var(--text) 0%, var(--info) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .canvas-wrap {
      background: var(--canvas-bg);
      border: 1px solid var(--panel-border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }
    canvas { display: block; width: 100%; height: auto; }

    .progress-accent .progress-bar {
      background: linear-gradient(90deg, var(--accent), var(--data));
    }

    .explanation-panel {
      background: var(--surface);
      border: 1px solid var(--panel-border);
      border-left: 3px solid var(--accent);
    }

    .speed-group { background: rgba(128, 128, 128, 0.15); }
    .speed-group .btn-speed.active {
      background: var(--primary) !important;
      color: #fff !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .btn-glow.active {
      background-color: var(--accent) !important;
      border-color: var(--accent) !important;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .controls-panel {
      background: var(--surface);
      border: 1px solid var(--panel-border);
    }

    .step-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      padding: 0;
      cursor: pointer;
      background: var(--text-dim);
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .step-dot:hover { transform: scale(1.3); }
    .step-dot.completed { background: var(--success); }
    .step-dot.active { background: var(--accent); transform: scale(1.3); }

    @media (max-width: 576px) {
      .btn-label { display: none; }
    }

    /* __CUSTOM_CSS__ */
  </style>
</head>
<body class="d-flex justify-content-center p-3">

  <div id="app" class="d-flex flex-column gap-2 w-100" style="max-width: 960px;"></div>

  <!-- CDN: Preact + HTM (UMD — works with file:// protocol) -->
  <script src="https://cdn.jsdelivr.net/npm/preact@10.25.4/dist/preact.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/preact@10.25.4/hooks/dist/hooks.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.umd.js"></script>

  <script>
    const { h, render } = preact;
    const { useState, useEffect, useRef, useCallback } = preactHooks;
    const html = htm.bind(h);

    /* ═══════════════════════════════════════════════
       DRAWING LIBRARY
       Helpers for Canvas 2D drawing. All functions
       operate on the passed `ctx` and use CSS vars
       for theming. Dimensions W/H are set by the engine.
       ═══════════════════════════════════════════════ */

    const _colorCache = {};
    function color(varName) {
      if (_colorCache[varName]) return _colorCache[varName];
      const v = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
      _colorCache[varName] = v;
      return v;
    }

    // ── Shapes ────────────────────────────────────

    /** Rounded rectangle (filled + optional stroke) */
    function drawBox(ctx, x, y, w, h, opts = {}) {
      const { fill = color('--surface'), stroke = null, lineWidth = 2, radius = 8, opacity = 1 } = opts;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, radius);
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
      ctx.restore();
    }

    /** Circle (filled + optional stroke) */
    function drawCircle(ctx, x, y, r, opts = {}) {
      const { fill = color('--node-a'), stroke = null, lineWidth = 2, opacity = 1 } = opts;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
      ctx.restore();
    }

    /** Diamond shape centered at (cx, cy) */
    function drawDiamond(ctx, cx, cy, w, h, opts = {}) {
      const { fill = color('--warning'), stroke = null, lineWidth = 2, opacity = 1 } = opts;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.beginPath();
      ctx.moveTo(cx, cy - h / 2);
      ctx.lineTo(cx + w / 2, cy);
      ctx.lineTo(cx, cy + h / 2);
      ctx.lineTo(cx - w / 2, cy);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
      ctx.restore();
    }

    // ── Text ──────────────────────────────────────

    /** Draw text with full control */
    function drawText(ctx, text, x, y, opts = {}) {
      const {
        size = 14, weight = '400', fillColor = color('--text'),
        align = 'center', baseline = 'middle', maxWidth, opacity = 1
      } = opts;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.fillStyle = fillColor;
      ctx.font = `${weight} ${size}px 'Inter', system-ui, sans-serif`;
      ctx.textAlign = align;
      ctx.textBaseline = baseline;
      if (maxWidth) ctx.fillText(text, x, y, maxWidth);
      else ctx.fillText(text, x, y);
      ctx.restore();
    }

    /** Label inside a pill/badge shape */
    function drawPill(ctx, text, x, y, opts = {}) {
      const { fill = color('--primary'), textColor = color('--text'), size = 12, px = 12, py = 4 } = opts;
      ctx.font = `500 ${size}px 'Inter', system-ui, sans-serif`;
      const tw = ctx.measureText(text).width;
      const pw = tw + px * 2;
      const ph = size + py * 2;
      drawBox(ctx, x - pw / 2, y - ph / 2, pw, ph, { fill, radius: ph / 2 });
      drawText(ctx, text, x, y, { size, weight: '500', fillColor: textColor });
    }

    // ── Lines & Arrows ────────────────────────────

    /** Arrow with arrowhead */
    function drawArrow(ctx, x1, y1, x2, y2, opts = {}) {
      const { strokeColor = color('--text-muted'), lineWidth = 2, headSize = 10, dash = null, opacity = 1 } = opts;
      const angle = Math.atan2(y2 - y1, x2 - x1);
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.beginPath();
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = lineWidth;
      if (dash) ctx.setLineDash(dash);
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = strokeColor;
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - headSize * Math.cos(angle - 0.4), y2 - headSize * Math.sin(angle - 0.4));
      ctx.lineTo(x2 - headSize * Math.cos(angle + 0.4), y2 - headSize * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    /** Dashed line (no arrowhead) */
    function drawDashedLine(ctx, x1, y1, x2, y2, opts = {}) {
      const { strokeColor = color('--text-muted'), lineWidth = 1, dash = [6, 4], opacity = 1 } = opts;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.setLineDash(dash);
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    /** Solid line (no arrowhead) */
    function drawLine(ctx, x1, y1, x2, y2, opts = {}) {
      const { strokeColor = color('--text-muted'), lineWidth = 2, opacity = 1 } = opts;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }

    /** Curved arrow (quadratic bezier) */
    function drawCurvedArrow(ctx, x1, y1, cpx, cpy, x2, y2, opts = {}) {
      const { strokeColor = color('--text-muted'), lineWidth = 2, headSize = 10, opacity = 1 } = opts;
      const angle = Math.atan2(y2 - cpy, x2 - cpx);
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo(cpx, cpy, x2, y2);
      ctx.stroke();
      ctx.fillStyle = strokeColor;
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - headSize * Math.cos(angle - 0.4), y2 - headSize * Math.sin(angle - 0.4));
      ctx.lineTo(x2 - headSize * Math.cos(angle + 0.4), y2 - headSize * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // ── Animation helpers ─────────────────────────

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
    function easeOut(t) { return 1 - (1 - t) * (1 - t); }
    function easeIn(t) { return t * t; }

    /** Clamp value between min and max */
    function clamp(val, min, max) { return Math.min(max, Math.max(min, val)); }

    /** Sub-progress: map a portion of 0-1 to its own 0-1 range */
    function subProgress(progress, start, end) {
      return clamp((progress - start) / (end - start), 0, 1);
    }

    /** Animated moving packet/message between two points */
    function drawMovingPacket(ctx, x1, y1, x2, y2, progress, label, opts = {}) {
      const { fill = color('--data'), textColor = '#fff', size = 13, width = 80, height = 28 } = opts;
      const t = easeInOut(clamp(progress, 0, 1));
      const x = lerp(x1, x2, t);
      const y = lerp(y1, y2, t);
      // Shadow for depth
      ctx.save();
      ctx.shadowColor = fill;
      ctx.shadowBlur = 12;
      drawBox(ctx, x - width / 2, y - height / 2, width, height, { fill, radius: height / 2 });
      ctx.restore();
      drawText(ctx, label, x, y, { size, weight: '600', fillColor: textColor });
    }

    /** Glow effect wrapper */
    function withGlow(ctx, drawFn, glowColor = color('--accent'), blur = 15) {
      ctx.save();
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = blur;
      drawFn();
      ctx.restore();
    }

    /** Pulsing opacity (for highlighting) */
    function pulse(time, speed = 2) {
      return 0.5 + 0.5 * Math.sin(time * speed * Math.PI);
    }

    // ── Expose drawing library globally ───────────
    // So content section can use them without imports
    Object.assign(window, {
      color, drawBox, drawCircle, drawDiamond, drawText, drawPill,
      drawArrow, drawDashedLine, drawLine, drawCurvedArrow,
      lerp, easeInOut, easeOut, easeIn, clamp, subProgress,
      drawMovingPacket, withGlow, pulse
    });


    /* ═══════════════════════════════════════════════
       CONTENT — FILL THIS SECTION

       You MUST define:
       1. STEPS array — each step has:
          - draw(ctx, progress, W, H, stepIndex) — REQUIRED, animation during this step
          - drawResult(ctx, W, H, stepIndex) — OPTIONAL, what persists after step completes
            (e.g., an arrow stays but the moving packet is gone)
            If omitted, draw(ctx, 1, ...) is used as fallback.

       2. (optional) drawBackground(ctx, W, H)
          — static elements drawn every frame behind everything

       3. (optional) drawOverlay(ctx, W, H, currentStep, progress)
          — drawn on top every frame

       Drawing library (all take ctx as first arg):
         Shapes:    drawBox, drawCircle, drawDiamond
         Text:      drawText, drawPill
         Lines:     drawArrow, drawDashedLine, drawLine, drawCurvedArrow
         Animate:   drawMovingPacket, withGlow, pulse
         Math:      lerp, easeInOut, easeOut, easeIn, clamp, subProgress
         Theme:     color('--var-name')

       Use relative positions: W * 0.25, H * 0.1, etc.
       Use subProgress(progress, 0, 0.5) to sequence
       animations within a single step.
       ═══════════════════════════════════════════════ */

    // __CONTENT_START__

    const STEPS = [
      {
        title: "Example step",
        explain: "Replace this with your steps. Open the template docs in SKILL.md for the full API reference.",
        // draw() — runs during animation (progress: 0→1)
        draw(ctx, progress, W, H) {
          // Static part (arrow line)
          drawArrow(ctx, W * 0.25, H * 0.5, W * 0.75, H * 0.5, { strokeColor: color('--accent') });
          // Animated part (moving packet — only visible during this step)
          drawMovingPacket(ctx, W * 0.25, H * 0.5, W * 0.75, H * 0.5, progress, 'SYN');
          // Label fades in at end
          const labelP = subProgress(progress, 0.7, 1);
          if (labelP > 0) drawPill(ctx, 'SENT', W * 0.5, H * 0.35, { fill: color('--success') });
        },
        // drawResult() — what stays on screen after this step completes
        // (no moving packet, just the arrow + label)
        drawResult(ctx, W, H) {
          drawArrow(ctx, W * 0.25, H * 0.5, W * 0.75, H * 0.5, { strokeColor: color('--accent') });
          drawPill(ctx, 'SENT', W * 0.5, H * 0.35, { fill: color('--success') });
        }
      }
    ];

    // function drawBackground(ctx, W, H) { }
    // function drawOverlay(ctx, W, H, currentStep, progress) { }

    // __CONTENT_END__


    /* ═══════════════════════════════════════════════
       APP COMPONENT — DO NOT MODIFY
       Preact component handles all UI: canvas, controls,
       step navigation, keyboard, speed, progress bar.
       ═══════════════════════════════════════════════ */

    function App() {
      const canvasRef = useRef(null);
      const wrapRef = useRef(null);

      // Restore step from localStorage, or start at 0
      const initialStep = (() => {
        const saved = localStorage.getItem('demo-step');
        if (saved !== null) {
          const n = parseInt(saved, 10);
          if (!isNaN(n) && n >= 0 && n < STEPS.length) return n;
        }
        return 0;
      })();

      const [step, setStep] = useState(initialStep);
      const [playing, setPlaying] = useState(false);
      const [speed, setSpeed] = useState(1);

      // Auto-detect dark/light preference
      const [dark, setDark] = useState(() => {
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
      });
      const [isFullscreen, setIsFullscreen] = useState(false);

      // Set initial theme on mount
      useEffect(() => {
        document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
      }, []);

      // Persist step to localStorage
      useEffect(() => {
        localStorage.setItem('demo-step', step);
      }, [step]);

      // Theme toggle
      const toggleTheme = useCallback(() => {
        setDark(d => {
          const next = !d;
          document.documentElement.setAttribute('data-bs-theme', next ? 'dark' : 'light');
          // Clear color cache so canvas picks up new CSS vars
          Object.keys(_colorCache).forEach(k => delete _colorCache[k]);
          return next;
        });
      }, []);

      // Fullscreen toggle
      const toggleFullscreen = useCallback(() => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen().catch(() => {});
        }
      }, []);

      // Sync isFullscreen state with Fullscreen API events
      useEffect(() => {
        const onChange = () => setIsFullscreen(!!document.fullscreenElement);
        document.addEventListener('fullscreenchange', onChange);
        return () => document.removeEventListener('fullscreenchange', onChange);
      }, []);
      const animRef = useRef({ progress: 0, pauseTimer: 0, lastTs: null });
      const dimsRef = useRef({ W: 0, H: 0 });

      // Canvas setup
      const setupCanvas = useCallback(() => {
        const cvs = canvasRef.current;
        const wrap = wrapRef.current;
        if (!cvs || !wrap) return;
        const dpr = window.devicePixelRatio || 1;
        const rect = wrap.getBoundingClientRect();
        const W = rect.width;
        const H = W * 0.56;
        cvs.width = W * dpr;
        cvs.height = H * dpr;
        cvs.style.width = W + 'px';
        cvs.style.height = H + 'px';
        const ctx = cvs.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        dimsRef.current = { W, H };
      }, []);

      // Render frame
      const renderFrame = useCallback(() => {
        const cvs = canvasRef.current;
        if (!cvs) return;
        const ctx = cvs.getContext('2d');
        const { W, H } = dimsRef.current;
        ctx.clearRect(0, 0, W, H);
        // Fill canvas with theme background
        ctx.fillStyle = color('--canvas-bg');
        ctx.fillRect(0, 0, W, H);

        if (typeof window.drawBackground === 'function') window.drawBackground(ctx, W, H);

        const currentStep = step;
        // Draw completed steps — use drawResult (persistent aftermath) if defined,
        // otherwise fall back to draw(ctx, 1, ...) for backward compatibility
        for (let i = 0; i < currentStep; i++) {
          if (STEPS[i]?.drawResult) {
            STEPS[i].drawResult(ctx, W, H, i);
          } else if (STEPS[i]?.draw) {
            STEPS[i].draw(ctx, 1, W, H, i);
          }
        }
        // Draw current step (animating)
        if (STEPS[currentStep]?.draw) {
          STEPS[currentStep].draw(ctx, animRef.current.progress, W, H, currentStep);
        }

        if (typeof window.drawOverlay === 'function') {
          window.drawOverlay(ctx, W, H, currentStep, animRef.current.progress);
        }
      }, [step]);

      // Animation loop
      useEffect(() => {
        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        let rafId;
        const tick = (ts) => {
          const a = animRef.current;
          if (a.lastTs === null) a.lastTs = ts;
          const dt = (ts - a.lastTs) / 1000;
          a.lastTs = ts;

          if (playing) {
            if (a.progress < 1) {
              a.progress = Math.min(1, a.progress + dt / speed);
            } else {
              a.pauseTimer += dt;
              if (a.pauseTimer >= 0.5) {
                if (step < STEPS.length - 1) {
                  a.progress = 0;
                  a.pauseTimer = 0;
                  setStep(s => s + 1);
                } else {
                  setPlaying(false);
                }
              }
            }
          }

          renderFrame();
          rafId = requestAnimationFrame(tick);
        };

        rafId = requestAnimationFrame(tick);
        return () => {
          cancelAnimationFrame(rafId);
          window.removeEventListener('resize', setupCanvas);
        };
      }, [step, playing, speed, setupCanvas, renderFrame]);

      // Navigation
      const goNext = useCallback(() => {
        if (step < STEPS.length - 1) {
          animRef.current = { progress: 0, pauseTimer: 0, lastTs: null };
          setStep(s => s + 1);
        }
      }, [step]);

      const goPrev = useCallback(() => {
        if (step > 0) {
          animRef.current = { progress: 1, pauseTimer: 0, lastTs: null };
          setStep(s => s - 1);
        }
      }, [step]);

      const togglePlay = useCallback(() => {
        if (!playing && step === STEPS.length - 1 && animRef.current.progress >= 1) {
          animRef.current = { progress: 0, pauseTimer: 0, lastTs: null };
          setStep(0);
          setPlaying(true);
        } else {
          animRef.current.lastTs = null;
          setPlaying(p => !p);
        }
      }, [playing, step]);

      const resetAll = useCallback(() => {
        setPlaying(false);
        animRef.current = { progress: 0, pauseTimer: 0, lastTs: null };
        setStep(0);
      }, []);

      // Jump to arbitrary step (for step scrubber)
      const goToStep = useCallback((target) => {
        if (target < 0 || target >= STEPS.length) return;
        setPlaying(false);
        // If jumping forward, show completed state; if back, start animation from 0
        animRef.current = {
          progress: target > step ? 0 : (target < step ? 1 : animRef.current.progress),
          pauseTimer: 0,
          lastTs: null
        };
        setStep(target);
      }, [step]);

      // Keyboard
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { goNext(); e.preventDefault(); }
          if (e.key === 'ArrowLeft') { goPrev(); e.preventDefault(); }
          if (e.key === ' ') { togglePlay(); e.preventDefault(); }
          if (e.key.toLowerCase() === 'r') { resetAll(); e.preventDefault(); }
          if (e.key.toLowerCase() === 'f') { toggleFullscreen(); e.preventDefault(); }
        };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [goNext, goPrev, togglePlay, resetAll, toggleFullscreen]);

      const current = STEPS[step] || {};
      const pct = ((step + animRef.current.progress) / STEPS.length) * 100;
      const btnClass = dark ? 'btn-outline-light' : 'btn-outline-dark';
      const speeds = [
        { val: 2, label: 'Slow', icon: 'bi-chevron-right' },
        { val: 1, label: 'Normal', icon: 'bi-forward' },
        { val: 0.4, label: 'Fast', icon: 'bi-lightning-charge' },
      ];

      return html`
        <div class="text-center py-2 position-relative">
          <h1 class="gradient-title fw-bold fs-3 mb-1">__TITLE__</h1>
          <p class="text-secondary small mb-0">__SUBTITLE__</p>
          <div class="position-absolute top-0 end-0 mt-1 me-1 d-flex gap-1">
            <button class="btn btn-sm border-0"
                    onClick=${toggleFullscreen} title=${isFullscreen ? 'Exit fullscreen' : 'Fullscreen'}
                    style="font-size: 1.2rem; opacity: 0.6;">
              <i class="bi ${isFullscreen ? 'bi-fullscreen-exit' : 'bi-fullscreen'}"></i>
            </button>
            <button class="btn btn-sm border-0"
                    onClick=${toggleTheme} title=${dark ? 'Switch to light mode' : 'Switch to dark mode'}
                    style="font-size: 1.2rem; opacity: 0.6;">
              <i class="bi ${dark ? 'bi-sun' : 'bi-moon-fill'}"></i>
            </button>
          </div>
        </div>

        <div class="canvas-wrap rounded-4 overflow-hidden" ref=${wrapRef}>
          <canvas ref=${canvasRef}></canvas>
        </div>

        <div class="progress progress-accent" style="height: 3px;">
          <div class="progress-bar" style=${{ width: pct + '%', transition: 'width 0.25s ease' }}></div>
        </div>

        <div class="d-flex justify-content-center align-items-center gap-2 py-1 flex-wrap">
          ${STEPS.map((_, i) => html`
            <button class="step-dot ${i < step ? 'completed' : ''} ${i === step ? 'active' : ''}"
                    onClick=${() => goToStep(i)}
                    title=${'Step ' + (i + 1) + ': ' + (STEPS[i].title || '')}></button>
          `)}
        </div>

        <div class="d-flex flex-wrap align-items-center justify-content-center gap-2 p-3 rounded-4"
             style="background: var(--surface); border: 1px solid rgba(255,255,255,0.06);">
          <button class="btn ${btnClass} btn-sm d-inline-flex align-items-center gap-1"
                  onClick=${goPrev} disabled=${step === 0} title="Previous (←)">
            <i class="bi bi-skip-backward-fill"></i><span class="btn-label">Prev</span>
          </button>
          <button class="btn ${btnClass} btn-sm btn-glow d-inline-flex align-items-center gap-1 ${playing ? 'active' : ''}"
                  onClick=${togglePlay} title="Play / Pause (Space)">
            <i class="bi ${playing ? 'bi-pause-fill' : 'bi-play-fill'}"></i>
            <span class="btn-label">${playing ? 'Pause' : 'Play'}</span>
          </button>
          <button class="btn ${btnClass} btn-sm d-inline-flex align-items-center gap-1"
                  onClick=${goNext} disabled=${step === STEPS.length - 1} title="Next (→)">
            <i class="bi bi-skip-forward-fill"></i><span class="btn-label">Next</span>
          </button>
          <button class="btn ${btnClass} btn-sm" onClick=${resetAll} title="Reset (R)">
            <i class="bi bi-arrow-counterclockwise"></i>
          </button>

          <span class="text-secondary small ms-2" style="font-variant-numeric: tabular-nums; min-width: 100px;">
            Step ${step + 1} of ${STEPS.length}
          </span>

          <div class="speed-group d-flex align-items-center gap-1 rounded-3 p-1 ms-auto">
            <small class="text-uppercase fw-semibold px-1 d-none d-sm-inline"
                   style="font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.05em;">Speed</small>
            ${speeds.map(s => html`
              <button class="btn btn-sm btn-speed border-0 ${speed === s.val ? 'active' : ''}"
                style="background: transparent; color: var(--text-muted); font-size: 0.78rem;"
                onClick=${() => setSpeed(s.val)} title=${s.label}>
                <i class="bi ${s.icon}"></i>
              </button>
            `)}
          </div>
        </div>

        <div class="text-center fw-semibold" style="color: var(--accent); min-height: 1.4em;">
          ${current.title || ''}
        </div>

        <div class="explanation-panel rounded-4 p-3" style="color: var(--text-muted); line-height: 1.7; min-height: 60px;">
          ${current.explain || ''}
        </div>

        <div class="text-center small" style="font-size: 0.72rem; color: var(--text-dim);">
          <kbd>←</kbd> <kbd>→</kbd> navigate${' '}
          <kbd>Space</kbd> play/pause${' '}
          <kbd>R</kbd> reset${' '}
          <kbd>F</kbd> fullscreen
        </div>

        <footer class="text-center text-secondary" style="font-size: 0.75rem;">
          __SOURCE_HTML__
          <br/>Generated by Claude Teacher
        </footer>
      `;
    }

    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
