name: Traffic to Badge

on:
  schedule:
    - cron: "1 0 * * *"
  workflow_dispatch:

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yi-Xu-0100/traffic-to-badge@main
        with:
          my_token: ${{ secrets.TRAFFIC_TOKEN }}
          traffic_branch: traffic
          clones_color: blue
          views_color: brightgreen

permissions:
  contents: write
